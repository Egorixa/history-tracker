<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>History Tracker — лента</title>
  <link rel="stylesheet" href="feed.css">
</head>
<body>
  <header>
    <h1>Лента канала</h1>
    <div class="header-right">
      <select id="channel-select"></select>
      <span id="user-badge" class="user-badge"></span>
    </div>
  </header>

  <section id="auth-warning" class="hidden">
    <p>Сначала войдите через всплывающее окно расширения.</p>
  </section>

  <section id="composer" class="hidden">
    <textarea id="post-body" rows="3" maxlength="4096" placeholder="Что нового? Поделитесь мыслью с подписчиками канала…"></textarea>
    <div class="composer-row">
      <span class="hint" id="composer-hint"></span>
      <button type="button" id="post-submit">Опубликовать</button>
    </div>
  </section>

  <section id="feed-section">
    <div class="filter-bar" role="tablist" aria-label="Тип записей">
      <button type="button" class="filter-btn active" data-filter="all" role="tab">Всё</button>
      <button type="button" class="filter-btn" data-filter="post" role="tab">Посты</button>
      <button type="button" class="filter-btn" data-filter="visit" role="tab">Визиты</button>
    </div>
    <div id="feed-list" class="feed-list">
      <div class="feed-empty">Выберите канал.</div>
    </div>
    <div class="row">
      <button type="button" id="refresh" class="secondary">Обновить</button>
    </div>
    <p class="status" id="status"></p>
  </section>

  <script type="module" src="feed.js"></script>
</body>
</html>
